<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C6CFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#grad1)"/>
  <!-- Document shape -->
  <rect x="52" y="38" width="96" height="120" rx="10" fill="rgba(255,255,255,0.15)"/>
  <rect x="52" y="38" width="96" height="120" rx="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Lines on document -->
  <rect x="66" y="62" width="68" height="6" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="66" y="76" width="50" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="66" y="88" width="60" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="66" y="100" width="45" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <!-- Accent spark / checkmark circle -->
  <circle cx="148" cy="148" r="30" fill="url(#grad2)"/>
  <!-- Checkmark -->
  <polyline points="136,148 145,158 162,138" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
